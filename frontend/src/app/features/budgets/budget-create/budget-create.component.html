<main class="form-page">
  <section class="form-card" aria-labelledby="create-budget-title">
    <p class="eyebrow">new</p>
    <h1 id="create-budget-title">budget</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="name">name</label>
      <input id="name" type="text" formControlName="name" maxlength="100" />

      <label for="starting-balance">starting balance</label>
      <input
        id="starting-balance"
        type="number"
        formControlName="startingBalance"
        min="0"
        step="0.01"
      />

      <div class="form-actions">
        <a class="secondary-button" routerLink="/budgets">cancel</a>
        <button class="primary-button" type="submit" [disabled]="submitting()">add</button>
      </div>
    </form>
  </section>
</main>
