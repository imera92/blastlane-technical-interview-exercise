<main class="form-page">
  <section class="form-card" aria-labelledby="create-transaction-title">
    <p class="eyebrow">{{ budgetName() }}</p>
    <h1 id="create-transaction-title">transaction</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="name">name</label>
      <input id="name" type="text" formControlName="name" maxlength="100" />

      <label for="amount">amount</label>
      <input id="amount" type="number" formControlName="amount" min="0.01" step="0.01" />

      <label for="date">date</label>
      <input id="date" type="date" formControlName="date" />

      <span class="type-label">type</span>
      <button
        class="type-button"
        [class.income]="type() === 'income'"
        [class.expense]="type() === 'expense'"
        type="button"
        (click)="toggleType()"
      >
        {{ type() }}
      </button>

      <div class="form-actions">
        <a class="secondary-button" [routerLink]="['/budgets', budgetId]">cancel</a>
        <button class="primary-button" type="submit" [disabled]="submitting()">add</button>
      </div>
    </form>
  </section>
</main>
